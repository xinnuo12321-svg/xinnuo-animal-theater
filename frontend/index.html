<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式动物微观剧场</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: linear-gradient(135deg, #0f172a 0%, #1a2332 50%, #0f172a 100%); color: #f8fafc; font-family: 'PingFang SC', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; }
        .container { width: 100%; max-width: 400px; margin: 0 auto; background: linear-gradient(145deg, rgba(30,41,59,0.95), rgba(15,23,42,0.9)); backdrop-filter: blur(10px); border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05); }
        
        .image-wrapper { width: 100%; height: 320px; background: linear-gradient(135deg, #334155 0%, #1e293b 100%); position: relative; overflow: hidden; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
        .image-wrapper img.loading { opacity: 0; }
        .skeleton { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; z-index: 1; }
        @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .info-panel { padding: 25px 20px; text-align: center; position: relative; }
        h2 { font-size: 28px; margin: 0 0 10px 0; color: #38bdf8; letter-spacing: 2px; text-shadow: 0 0 15px rgba(56,189,248,0.3); }
        .tag { display: inline-block; font-size: 12px; color: #38bdf8; padding: 4px 12px; background: rgba(56,189,248,0.1); border-radius: 12px; border: 1px solid rgba(56,189,248,0.2); margin-bottom: 15px; opacity: 0; transition: opacity 0.3s; }
        .tag.show { opacity: 1; }
        
        .story { font-size: 15px; line-height: 1.8; color: #cbd5e1; margin: 15px 0 25px 0; min-height: 85px; text-align: justify; opacity: 0; transition: opacity 0.4s; }
        .story.fade-in { opacity: 1; }
        
        .btn-explore { background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%); color: #0f172a; border: none; padding: 15px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 10px 20px -5px rgba(56,189,248,0.4); transition: transform 0.2s; }
        .btn-explore:active { transform: scale(0.96); }
        .btn-explore:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .audio-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .audio-status { font-size: 12px; color: #94a3b8; }
        .btn-play-audio { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px -3px rgba(16, 185, 129, 0.4); transition: transform 0.2s; }
        .btn-play-audio:active { transform: scale(0.95); }
        .btn-play-audio:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-play-audio.hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <div class="skeleton" id="skeleton" style="display: none;"></div>
            <img id="ani-img" src="" alt="动物图鉴">
        </div>
        <div class="info-panel">
            <h2 id="ani-name">万物有灵</h2>
            <span class="tag" id="animal-tag"></span>
            
            <div class="audio-box">
                <span id="audio-status" class="audio-status">🎵 准备就绪</span>
            </div>

            <p class="story" id="ani-story">点击下方按钮，进入大自然...</p>
            <button class="btn-explore" id="main-btn" onclick="nextDiscovery()">🌲 开启探索</button>
            <button class="btn-play-audio hidden" id="btn-play" onclick="playAnimalSound()">🔊 播放真实声音</button>
            <audio id="ani-audio"></audio>
        </div>
    </div>

    <script>
        const audio = document.getElementById('ani-audio');
        const audioStatus = document.getElementById('audio-status');
        const aniImg = document.getElementById('ani-img');
        const skeleton = document.getElementById('skeleton');
        const aniStory = document.getElementById('ani-story');
        const btn = document.getElementById('main-btn');
        const btnPlay = document.getElementById('btn-play');
        const animalTag = document.getElementById('animal-tag');
        
        // 设置音频音量
        audio.volume = 0.8;
        
        // 音频事件监听
        audio.onplay = () => { 
            audioStatus.innerText = "🔊 正在播放真实野外声音"; 
            btnPlay.disabled = true;
        };
        audio.onpause = () => { 
            audioStatus.innerText = "🎵 播放完毕，可再次播放"; 
            btnPlay.disabled = false;
        };
        audio.onended = () => { 
            audioStatus.innerText = "🎵 播放完毕"; 
            btnPlay.disabled = false;
        };
        audio.onerror = () => { 
            audioStatus.innerText = "🔇 音频加载失败，请稍后重试"; 
            btnPlay.disabled = true;
        };
        
        // 用户主动播放音频（解决浏览器自动播放限制）
        function playAnimalSound() {
            if (audio.src) {
                audio.play().catch(err => {
                    audioStatus.innerText = "❌ 播放失败：" + err.message;
                });
            } else {
                audioStatus.innerText = "⚠️ 请先选择一个动物";
            }
        }
        
        async function nextDiscovery() {
            btn.innerText = "正在穿越森林...";
            btn.disabled = true;
            audioStatus.innerText = "🔍 搜集中...";
            animalTag.classList.remove('show');
            aniStory.classList.remove('fade-in');
            btnPlay.classList.add('hidden');  // 隐藏播放按钮
            
            skeleton.style.display = 'block';
            aniImg.classList.add('loading');

            try {
                const response = await fetch('/api/animal');
                const result = await response.json();
                
                document.getElementById('ani-name').innerText = result.name;
                animalTag.innerText = result.tag || '';
                animalTag.classList.add('show');
                aniStory.innerText = result.story;
                aniStory.classList.add('fade-in');
                
                // 图片走代理（解决防盗链），音频直接加载（不受CORS限制）
                const proxyImageUrl = `/api/proxy?url=${encodeURIComponent(result.image)}`;

                // 音频直接加载（audio标签不受CORS限制，无需代理）
                audio.src = result.audio;
                audio.load();
                audioStatus.innerText = "🎵 真实声音已就绪，点击按钮播放";
                btnPlay.classList.remove('hidden');
                btnPlay.disabled = false;

                // 渲染图片
                aniImg.src = proxyImageUrl;
                aniImg.onload = () => {
                    skeleton.style.display = 'none';
                    aniImg.classList.remove('loading');
                };
                aniImg.onerror = () => {
                    skeleton.style.display = 'none';
                    aniImg.classList.remove('loading');
                    audioStatus.innerText = "⚠️ 图片加载失败，但声音可以播放";
                };
                
                // 显示播放按钮（音频加载完成后）
                audio.onloadeddata = () => {
                    btnPlay.classList.remove('hidden');
                    btnPlay.disabled = false;
                };

            } catch (error) {
                aniStory.innerText = "森林信号太弱啦，刷新网页重试一下吧 📡";
                aniStory.classList.add('fade-in');
                skeleton.style.display = 'none';
                audioStatus.innerText = "❌ 信号断开";
                btnPlay.classList.add('hidden');
            } finally {
                btn.innerText = "🌲 寻找下一个";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
